<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<style>
    @font-face {
        font-family: AnsFont;
        src: url('/static/fonts/arial.ttf');
        font-weight: normal;
    }
    @font-face {
        font-family: AnsFont;
        src: url('/static/fonts/arialbd.ttf');
        font-weight: bold;
    }
    @page { size: A4; margin: 2cm 1.8cm; }
    body { font-family: AnsFont; font-size: 10.5pt; color: #000; }
    h1 { font-size: 14pt; margin: 0 0 4px; text-align: center; }
    h2 { font-size: 11pt; margin: 16px 0 6px; border-bottom: 1px solid #000; padding-bottom: 3px; }
    .meta { font-size: 9pt; text-align: center; color: #333; margin-bottom: 14px; }
    .kv { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    .kv td { border: 1px solid #000; padding: 4px 6px; vertical-align: top; font-size: 10pt; }
    .kv td.k { width: 35%; background: #eee; font-weight: bold; }
    .tbl { width: 100%; border-collapse: collapse; font-size: 9.5pt; }
    .tbl th, .tbl td { border: 1px solid #000; padding: 4px 5px; vertical-align: top; }
    .tbl th { background: #e8e8e8; }
    .block { border: 1px solid #000; padding: 8px 10px; min-height: 60px; font-size: 10pt; }
    .sign { margin-top: 45px; width: 100%; }
    .sign td { padding: 28px 10px 4px; text-align: center; font-size: 9pt; border-top: 1px dashed #000; width: 50%; }
    .small { font-size: 8.5pt; color: #333; }
    .tight { margin: 2px 0; }
</style>
</head>
<body>
<div class="hdr">
    <div style="text-align:center;font-size:9pt;">Akademia Nauk Stosowanych w Elblągu</div>
    <h1>{% block doc_title %}{% endblock %}</h1>
    <div class="meta">{% block doc_subtitle %}{% endblock %}</div>
</div>
{% block body %}{% endblock %}
</body>
</html>
