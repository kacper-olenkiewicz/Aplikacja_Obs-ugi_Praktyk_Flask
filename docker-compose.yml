services:
  postgres:
    image: postgres:16-alpine
    container_name: praktyki_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-praktyki_db}
      POSTGRES_USER: ${POSTGRES_USER:-praktyki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haslo}
    ports:
      - "5433:5432"
    volumes:
      - praktyki_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praktyki} -d ${POSTGRES_DB:-praktyki_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  praktyki_pgdata:
