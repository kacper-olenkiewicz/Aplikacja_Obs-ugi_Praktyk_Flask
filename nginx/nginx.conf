worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Limit uploadu (musi zgadzać się z Flask MAX_CONTENT_LENGTH)
    client_max_body_size 16M;

    upstream flask {
        # Round-robin po wszystkich replikach serwisu web
        server web:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Pliki statyczne serwowane bezpośrednio (bez Flask)
        location /static/ {
            alias /app/static/;
            expires 7d;
            access_log off;
        }

        # Upload files (read-only z nginx)
        location /uploads/ {
            alias /app/uploads/;
            expires 1h;
            access_log off;
        }

        # Wszystkie inne żądania → Flask przez gunicorn
        location / {
            proxy_pass http://flask;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Długi timeout dla requestów generujących PDF (fallback)
            proxy_read_timeout 120s;
            proxy_connect_timeout 5s;
        }
    }
}
