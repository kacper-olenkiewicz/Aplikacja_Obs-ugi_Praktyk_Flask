[databases]
; Przekierowanie do Postgres — nazwa bazy musi zgadzać się z POSTGRES_DB
praktyki_db = host=postgres port=5432 dbname=praktyki_db

[pgbouncer]
listen_port = 5432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Session mode — kompatybilny ze standardowym poolem SQLAlchemy
pool_mode = session

; Ilu klientów jednocześnie (użytkownicy aplikacji)
max_client_conn = 2000

; Ile realnych połączeń do Postgres per baza+user
default_pool_size = 30

; Rezerwowe połączenia dla adminów
reserve_pool_size = 5
reserve_pool_timeout = 3

; Odłącz bezczynnych klientów po 10 min
client_idle_timeout = 600

; Przetrzymaj połączenia do Postgres (nie zamykaj między requestami)
server_idle_timeout = 600

; Healthcheck
server_check_delay = 30
